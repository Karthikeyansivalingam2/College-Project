<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Login - Foodiee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/common.css?v=5">`n    <link rel="stylesheet" href="./assets/css/mobile.css?v=2">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>

<body class="bg-[var(--bg-main)] text-[var(--text-main)] min-h-screen">
    <header class="navbar w-full" id="global-navbar"></header>
    <main class="flex justify-center p-4 w-full content-padding pt-32">

        <div
            class="bg-[var(--bg-card)] rounded-[2.5rem] shadow-[var(--shadow-standard)] flex overflow-hidden w-full max-w-4xl min-h-[600px] border border-[var(--border-light)]">
            <!-- Left Side: Promo -->
            <div
                class="hidden md:flex w-1/2 bg-orange-600 relative flex-col justify-center items-center text-white p-12 text-center">
                <div class="absolute inset-0 z-0 opacity-40">
                    <img src="https://images.unsplash.com/photo-1552566626-52f8b828add9?q=80&w=800"
                        class="w-full h-full object-cover">
                </div>

                <div class="relative z-10">
                    <div
                        class="w-16 h-16 bg-white/20 backdrop-blur-md rounded-2xl flex items-center justify-center text-2xl mb-8 mx-auto shadow-xl">
                        <i class="fa-solid fa-handshake"></i>
                    </div>
                    <h2 class="text-4xl font-black mb-4 tracking-tighter uppercase">Partner Portal</h2>
                    <p class="text-orange-50 text-lg font-medium leading-relaxed opacity-90">Manage your business,
                        orders,
                        and
                        growth in one powerful dashboard.</p>

                    <div class="mt-12 space-y-4">
                        <div
                            class="flex items-center gap-4 bg-white/10 backdrop-blur-sm p-4 rounded-2xl border border-white/10 hover:bg-white/20 transition-all cursor-default">
                            <div class="w-8 h-8 bg-orange-500 rounded-lg flex items-center justify-center shadow-lg">
                                <i class="fa-solid fa-bolt text-xs"></i>
                            </div>
                            <span class="font-bold text-sm tracking-wide">Real-time Order Tracking</span>
                        </div>
                        <div
                            class="flex items-center gap-4 bg-white/10 backdrop-blur-sm p-4 rounded-2xl border border-white/10 hover:bg-white/20 transition-all cursor-default">
                            <div class="w-8 h-8 bg-orange-500 rounded-lg flex items-center justify-center shadow-lg">
                                <i class="fa-solid fa-wallet text-xs"></i>
                            </div>
                            <span class="font-bold text-sm tracking-wide">Instant Earnings Withdrawal</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Side: Login Form -->
            <div class="w-full md:w-1/2 p-10 md:p-16 relative flex flex-col justify-center bg-[var(--bg-card)]">
                <a href="partner.html"
                    class="absolute top-8 right-10 text-gray-400 hover:text-orange-500 font-black uppercase tracking-widest text-[10px] transition-colors">
                    <i class="fa-solid fa-arrow-left mr-2"></i> Register
                </a>

                <div class="mb-12">
                    <span
                        class="bg-orange-50 text-orange-500 text-[10px] font-black px-3 py-1 rounded-lg uppercase tracking-[0.2em] mb-4 inline-block shadow-sm">Merchant
                        Access</span>
                    <h1 class="text-4xl font-black text-[var(--text-dark)] tracking-tighter uppercase mb-2">Partner
                        Login</h1>
                    <p class="text-gray-400 font-medium">Welcome back! Please authenticate.</p>
                </div>

                <form id="partnerLoginForm" class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Partner
                            ID</label>
                        <div class="relative group">
                            <i
                                class="fa-solid fa-id-card absolute left-4 top-4 text-gray-400 group-focus-within:text-orange-500 transition-colors"></i>
                            <input type="text" id="partnerId" required
                                class="w-full pl-12 pr-4 py-4 bg-[var(--bg-secondary)] border border-[var(--border-light)] text-[var(--text-main)] rounded-2xl focus:outline-none focus:ring-4 focus:ring-orange-500/10 focus:border-orange-500 transition-all font-bold placeholder-gray-500"
                                placeholder="PTR-####">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label
                            class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Password</label>
                        <div class="relative group">
                            <i
                                class="fa-solid fa-lock absolute left-4 top-4 text-gray-400 group-focus-within:text-orange-500 transition-colors"></i>
                            <input type="password" id="password" required
                                class="w-full pl-12 pr-12 py-4 bg-[var(--bg-secondary)] border border-[var(--border-light)] text-[var(--text-main)] rounded-2xl focus:outline-none focus:ring-4 focus:ring-orange-500/10 focus:border-orange-500 transition-all font-bold placeholder-gray-500"
                                placeholder="••••••••">
                            <i class="fa-solid fa-eye absolute right-4 top-4 text-gray-300 cursor-pointer hover:text-orange-500 transition-colors"
                                id="togglePassword"></i>
                        </div>
                        <div class="flex justify-between items-center mt-4 px-1">
                            <label
                                class="flex items-center gap-2 text-[10px] font-black uppercase text-gray-400 cursor-pointer hover:text-orange-500 transition-colors">
                                <input type="checkbox" id="rememberMe"
                                    class="w-4 h-4 rounded-lg border-gray-200 text-orange-500 focus:ring-orange-500/20">
                                Stay Signed In
                            </label>
                            <a href="#"
                                class="text-[10px] font-black uppercase text-orange-500 hover:text-orange-600 tracking-widest transition-colors">Forgot?</a>
                        </div>
                    </div>

                    <div class="pt-6">
                        <button type="submit"
                            class="w-full bg-orange-500 text-white font-black py-5 rounded-[1.5rem] hover:bg-orange-600 transition-all shadow-xl shadow-orange-500/20 active:scale-[0.98] uppercase tracking-widest text-xs">
                            Enter Dashboard
                        </button>
                    </div>

                    <p class="text-center text-[10px] font-black text-gray-400 uppercase tracking-widest mt-8">
                        Not a partner? <a href="partner.html" class="text-orange-500 hover:text-orange-600">Start
                            application</a>
                    </p>
                </form>
            </div>
        </div>
    </main>
    <footer class="footer w-full" id="global-footer"></footer>
    <script src="./assets/js/common.js"></script>

    <script>
        // Check for remembered user
        const savedPartner = localStorage.getItem('rememberedPartnerId');
        if (savedPartner) {
            document.getElementById('partnerId').value = savedPartner;
            document.getElementById('rememberMe').checked = true;
        }

        // Toggle Password
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        document.getElementById('partnerLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const partnerId = document.getElementById('partnerId').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            try {
                const res = await fetch('/api/partner/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ partnerId, password })
                });

                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('currentPartner', JSON.stringify(data.partner));

                    if (rememberMe) {
                        localStorage.setItem('rememberedPartnerId', partnerId);
                    } else {
                        localStorage.removeItem('rememberedPartnerId');
                    }

                    window.location.href = 'partner-dashboard.html';
                } else {
                    alert(data.message || "Login failed");
                }
            } catch (err) {
                console.error(err);
                alert("Error connecting to server");
            }
        });
    </script>
</body>
</body>

</html>
