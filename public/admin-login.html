<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Foodiee</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/common.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-[var(--bg-main)] text-[var(--text-main)] flex flex-col min-h-screen">

    <!-- Navbar -->
    <header class="navbar" id="global-navbar"></header>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center py-20 px-4">
        <div
            class="bg-[var(--bg-card)] p-10 md:p-14 rounded-[2.5rem] shadow-[var(--shadow-standard)] w-full max-w-md border border-[var(--border-light)] relative overflow-hidden group">
            <!-- Branded Accent -->
            <div class="absolute top-0 left-0 w-full h-2 bg-orange-500"></div>

            <div class="text-center mb-10">
                <div
                    class="w-16 h-16 bg-orange-50 text-orange-500 rounded-2xl flex items-center justify-center text-2xl mb-6 mx-auto shadow-inner">
                    <i class="fa-solid fa-user-shield"></i>
                </div>
                <h1 class="text-3xl font-black text-[var(--text-dark)] tracking-tighter uppercase mb-2">Admin Portal
                </h1>
                <p class="text-gray-400 font-bold uppercase tracking-widest text-[10px]">Secure management access</p>
            </div>

            <form id="adminLoginForm" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Username</label>
                    <input type="text" id="adminUser"
                        class="w-full border border-gray-100 rounded-2xl p-4 bg-gray-50 text-gray-900 focus:outline-none focus:ring-4 focus:ring-orange-500/10 focus:border-orange-500 transition-all font-bold placeholder-gray-300"
                        placeholder="Admin account">
                </div>

                <div class="space-y-2 relative">
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Password</label>
                    <div class="relative group/pass">
                        <input type="password" id="adminPass"
                            class="w-full border border-gray-100 rounded-2xl p-4 bg-gray-50 text-gray-900 focus:outline-none focus:ring-4 focus:ring-orange-500/10 focus:border-orange-500 transition-all font-bold placeholder-gray-300 pr-12"
                            placeholder="••••••••">
                        <i class="fa-solid fa-eye absolute right-4 top-4 text-gray-300 cursor-pointer hover:text-orange-500 transition-colors"
                            id="toggleAdminPass"></i>
                    </div>
                </div>

                <div class="flex items-center justify-between px-1">
                    <label
                        class="flex items-center gap-2 text-xs text-gray-500 font-bold uppercase tracking-tighter hover:text-orange-500 cursor-pointer transition-colors">
                        <input type="checkbox" id="adminRememberMe"
                            class="w-4 h-4 rounded-lg border-[var(--border-light)] text-orange-500 focus:ring-orange-500/20 bg-[var(--bg-main)]">
                        Stay authenticated
                    </label>
                </div>

                <button type="submit"
                    class="w-full bg-orange-500 text-white font-black py-5 rounded-[1.5rem] hover:bg-orange-600 transition-all shadow-xl shadow-orange-500/20 active:scale-[0.98] uppercase tracking-widest text-xs mt-4">
                    Authenticate Securely
                </button>
            </form>

            <div class="text-center mt-10">
                <a href="index.html"
                    class="text-[10px] font-black uppercase tracking-widest text-gray-400 hover:text-orange-500 transition-colors">
                    <i class="fa-solid fa-arrow-left mr-2"></i> Return to Storefront
                </a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer" id="global-footer"></footer>

    <script src="./assets/js/common.js?v=7"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Check for remembered admin
            const savedAdmin = localStorage.getItem('rememberedAdminUser');
            if (savedAdmin) {
                const adminUserField = document.getElementById('adminUser');
                const rememberMeCheck = document.getElementById('adminRememberMe');
                if (adminUserField) adminUserField.value = savedAdmin;
                if (rememberMeCheck) rememberMeCheck.checked = true;
            }

            // Toggle Password
            const togglePassBtn = document.getElementById('toggleAdminPass');
            if (togglePassBtn) {
                togglePassBtn.addEventListener('click', function () {
                    const input = document.getElementById('adminPass');
                    const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                    input.setAttribute('type', type);
                    this.classList.toggle('fa-eye');
                    this.classList.toggle('fa-eye-slash');
                });
            }

            const loginForm = document.getElementById('adminLoginForm');
            if (loginForm) {
                loginForm.addEventListener('submit', function (e) {
                    e.preventDefault();

                    const userField = document.getElementById('adminUser');
                    const passField = document.getElementById('adminPass');
                    const rememberMeCheck = document.getElementById('adminRememberMe');

                    if (!userField || !passField) return;

                    const user = userField.value.trim();
                    const pass = passField.value.trim();
                    const rememberMe = rememberMeCheck ? rememberMeCheck.checked : false;

                    // Support both old and new credentials
                    if ((user === 'karthik' && pass === 'karthi123') || (user === 'admin' && pass === 'admin123')) {
                        localStorage.setItem('adminLoggedIn', 'true');

                        if (rememberMe) {
                            localStorage.setItem('rememberedAdminUser', user);
                        } else {
                            localStorage.removeItem('rememberedAdminUser');
                        }

                        // Success!
                        window.location.href = 'admin.html';
                    } else {
                        alert('Invalid Admin Credentials! Use admin / admin123');
                    }
                });
            }
        });
    </script>
</body>

</html>
