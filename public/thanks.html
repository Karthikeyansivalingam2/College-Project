<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success - Foodiee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #ffffff;
            color: #1f2937;
        }

        .success-card {
            background: #ffffff;
            border: 1px solid #f3f4f6;
        }

        .check-animation {
            animation: scaleUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes scaleUp {
            from {
                transform: scale(0);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">

    <!-- decorative background elements -->
    <div class="absolute top-0 left-0 w-full h-80 bg-orange-600 -skew-y-6 transform -translate-y-32 z-0">
    </div>

    <div
        class="success-card relative z-10 w-full max-w-lg rounded-[2.5rem] shadow-[0_32px_64px_-16px_rgba(0,0,0,0.1)] overflow-hidden text-center p-12 -mt-20">

        <div class="flex justify-center mb-8">
            <div
                class="w-24 h-24 bg-orange-50 rounded-full flex items-center justify-center check-animation shadow-inner border border-orange-100">
                <i id="mainIcon" class="fa-solid fa-check text-4xl text-orange-500"></i>
            </div>
        </div>

        <h1 id="mainTitle" class="text-4xl font-black text-gray-900 mb-2 tracking-tighter uppercase">Submission
            Successful!</h1>
        <p id="mainMessage" class="text-gray-500 font-medium mb-10">Thank you for reaching out to Foodiee.</p>

        <div id="refBox" class="bg-gray-50 rounded-3xl p-8 mb-10 border border-gray-100">
            <p class="text-[10px] uppercase tracking-[0.2em] text-gray-400 font-black mb-1" id="idLabel">Reference ID
            </p>
            <p class="text-3xl font-mono font-black text-orange-500 tracking-tighter" id="refId">#REQ-0000</p>

            <div class="mt-6 pt-6 border-t border-gray-200/50 text-gray-400">
                <div class="flex items-center justify-center text-xs font-bold uppercase tracking-widest gap-2">
                    <i class="fa-regular fa-clock text-orange-400"></i>
                    <span id="timingInfo">Our executive will contact you soon.</span>
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <div id="partnerActions" class="hidden">
                <a href="partner-login.html"
                    class="block w-full bg-orange-500 text-white font-black py-4 px-6 rounded-2xl hover:bg-orange-600 transition-all shadow-xl shadow-orange-500/20 mb-4 active:scale-95 uppercase tracking-widest">
                    Login to Dashboard
                </a>
            </div>
            <a href="index.html"
                class="block w-full bg-gray-900 text-white font-black py-4 px-6 rounded-2xl hover:bg-black transition-all shadow-xl active:scale-95 uppercase tracking-widest">
                Back to Home
            </a>
            <button onclick="window.print()"
                class="block w-full bg-white text-gray-400 font-bold py-4 px-6 rounded-2xl border border-gray-200 hover:bg-gray-50 transition-all uppercase tracking-widest text-sm">
                Print Acknowledgement
            </button>
        </div>

        <p class="mt-12 text-xs font-bold text-gray-400 uppercase tracking-widest">
            Need Help? <a href="tel:+919876543210" class="text-orange-500 hover:underline">+91 98765 43210</a>
        </p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type');
        const refId = urlParams.get('id');

        const titleEl = document.getElementById('mainTitle');
        const msgEl = document.getElementById('mainMessage');
        const iconEl = document.getElementById('mainIcon');
        const refIdEl = document.getElementById('refId');
        const idLabelEl = document.getElementById('idLabel');
        const timingEl = document.getElementById('timingInfo');

        if (refId) refIdEl.innerText = refId;
        else refIdEl.innerText = '#' + Math.floor(Math.random() * 900000 + 100000);

        if (type === 'partner') {
            titleEl.innerText = "Registration Sent!";
            msgEl.innerText = "Your application reached our onboarding team.";
            iconEl.className = "fa-solid fa-store text-4xl text-orange-500";
            idLabelEl.innerText = "Partner ID";
            timingEl.innerText = "Approval takes about 2-4 working hours.";
            document.getElementById('partnerActions').classList.remove('hidden');
        } else if (type === 'hall') {
            titleEl.innerText = "Booking Noted!";
            msgEl.innerText = "We've received your inquiry for the party hall.";
            iconEl.className = "fa-solid fa-calendar-check text-4xl text-orange-500";
            idLabelEl.innerText = "Request ID";
            timingEl.innerText = "Availability status will be shared via SMS.";
        } else if (type === 'job') {
            titleEl.innerText = "Success! Applied.";
            msgEl.innerText = "Best wishes! We've received your career application.";
            iconEl.className = "fa-solid fa-briefcase text-4xl text-orange-500";
            idLabelEl.innerText = "Application ID";
            timingEl.innerText = "Our HR team is reviewing your profile.";
        }
    </script>
</body>

</body>

</html>
