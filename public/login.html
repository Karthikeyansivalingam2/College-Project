<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Foodiee</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/common.css?v=8">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
    }
  </style>
</head>

<body class="bg-[var(--bg-main)] text-gray-100 flex items-center justify-center min-h-screen p-4">

  <div
    class="bg-[var(--bg-card)] rounded-[3rem] shadow-[0_32px_80px_rgba(0,0,0,0.8)] flex overflow-hidden w-full max-w-5xl min-h-[650px] border border-[var(--border-light)] relative">

    <!-- Left Side: Cinematic Branding -->
    <div
      class="hidden md:flex w-1/2 bg-orange-600 relative flex-col justify-center items-center text-white p-16 text-center overflow-hidden">

      <div class="absolute inset-0 z-0 scale-110">
        <img src="https://images.unsplash.com/photo-1543353071-873f17a7a088?q=80&w=800"
          class="w-full h-full object-cover brightness-50 contrast-125 saturate-50">
        <div class="absolute inset-0 bg-gradient-to-t from-orange-600/90 via-orange-600/40 to-transparent"></div>
      </div>

      <div class="relative z-10">
        <div class="logo-box mx-auto mb-8 w-16 h-16 text-3xl bg-white text-orange-600">F</div>
        <h1 class="text-6xl font-black mb-6 tracking-tighter uppercase italic leading-none">Foodiee<br><span
            class="text-white/80">Elite</span></h1>
        <p class="text-white font-black uppercase tracking-[0.3em] text-[10px] leading-relaxed opacity-80">The Future of
          Catering & Dining</p>
      </div>
    </div>

    <!-- Right Side: Forms -->
    <div class="w-full md:w-1/2 p-12 md:p-20 relative flex flex-col justify-center bg-[var(--bg-card)]">

      <!-- Navbar Back Link -->
      <a href="index.html"
        class="absolute top-8 right-10 text-gray-500 hover:text-orange-500 text-[10px] font-black uppercase tracking-[0.2em] transition-all bg-white/5 px-4 py-2 rounded-full border border-white/5">
        <i class="fa-solid fa-arrow-left mr-2"></i> Home
      </a>

      <!-- Tabs -->
      <div class="flex gap-10 mb-12 border-b border-white/5">
        <button onclick="switchTab('login')" id="tabLogin"
          class="pb-5 border-b-4 border-orange-600 font-black text-white uppercase tracking-[0.2em] text-[11px] transition-all">Identity
          Login</button>
        <button onclick="switchTab('signup')" id="tabSignup"
          class="pb-5 border-b-4 border-transparent text-gray-600 hover:text-white font-black uppercase tracking-[0.2em] text-[11px] transition-all">Initialize
          Access</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="space-y-6 animate-fade-in-up">
        <div class="mb-10">
          <h2 class="text-4xl font-black text-white mb-2 tracking-tighter uppercase italic">Welcome<br>Member</h2>
          <div class="h-1.5 w-12 bg-orange-600 rounded-full"></div>
        </div>

        <div class="space-y-4">
          <div class="group">
            <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-3 ml-1">Access
              Protocol (Email/Phone)</label>
            <div class="relative">
              <i
                class="fa-solid fa-user absolute left-5 top-1/2 -translate-y-1/2 text-gray-600 group-focus-within:text-orange-500 transition-colors"></i>
              <input type="text" id="loginUser"
                class="w-full border border-white/5 rounded-2xl p-5 pl-14 bg-white/5 text-white focus:outline-none focus:ring-2 focus:ring-orange-600/20 focus:border-orange-600 transition-all font-bold placeholder-gray-600 text-sm"
                placeholder="ENTER ID">
            </div>
          </div>

          <div class="group">
            <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-3 ml-1">Secure
              Passkey</label>
            <div class="relative">
              <i
                class="fa-solid fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-gray-600 group-focus-within:text-orange-500 transition-colors"></i>
              <input type="password" id="loginPass"
                class="w-full border border-white/5 rounded-2xl p-5 pl-14 bg-white/5 text-white focus:outline-none focus:ring-2 focus:ring-orange-600/20 focus:border-orange-600 transition-all font-bold placeholder-gray-600 text-sm tracking-widest"
                placeholder="••••••••">
              <i class="fa-solid fa-eye absolute right-5 top-1/2 -translate-y-1/2 text-gray-600 cursor-pointer hover:text-orange-500 transition-colors"
                id="toggleLoginPass"></i>
            </div>
          </div>
        </div>

        <div class="flex justify-between items-center mt-6">
          <label
            class="flex items-center gap-3 text-[10px] text-gray-500 cursor-pointer font-black uppercase tracking-widest hover:text-white transition-all">
            <input type="checkbox" id="userRememberMe"
              class="w-4 h-4 rounded-md border-white/10 bg-white/5 text-orange-600 focus:ring-orange-600/20">
            Remember Identity
          </label>
          <a href="#"
            class="text-[10px] text-orange-500 font-black uppercase tracking-widest hover:text-orange-400">Recovery?</a>
        </div>

        <button type="button" id="loginBtn" onclick="handleLogin()"
          class="w-full bg-orange-600 text-white font-black py-5 rounded-2xl hover:bg-orange-500 transition-all shadow-2xl shadow-orange-600/40 mt-10 active:scale-[0.98] uppercase tracking-[0.2em] text-xs flex items-center justify-center gap-3 group border-none cursor-pointer">
          Verify & Enter <i class="fa-solid fa-arrow-right group-hover:translate-x-1 transition-transform"></i>
        </button>
      </form>

      <!-- Signup Form -->
      <form id="signupForm" class="space-y-6 hidden animate-fade-in-up">
        <div class="mb-10">
          <h2 class="text-4xl font-black text-white mb-2 tracking-tighter uppercase italic">Create<br>Access</h2>
          <div class="h-1.5 w-12 bg-orange-600 rounded-full"></div>
        </div>

        <div class="space-y-4">
          <div class="group">
            <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-3 ml-1">Full
              Name</label>
            <input type="text" id="signupUser"
              class="w-full border border-white/5 rounded-2xl p-5 bg-white/5 text-white focus:outline-none focus:ring-2 focus:ring-orange-600/20 focus:border-orange-600 transition-all font-bold placeholder-gray-600 text-sm uppercase italic"
              placeholder="YOUR NAME">
          </div>

          <div class="group">
            <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-3 ml-1">Email
              Domain</label>
            <input type="email" id="signupEmail"
              class="w-full border border-white/5 rounded-2xl p-5 bg-white/5 text-white focus:outline-none focus:ring-2 focus:ring-orange-600/20 focus:border-orange-600 transition-all font-bold placeholder-gray-600 text-sm"
              placeholder="EMAIL@EXAMPLE.COM">
          </div>

          <div class="group">
            <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-3 ml-1">Master
              Password</label>
            <input type="password" id="signupPass"
              class="w-full border border-white/5 rounded-2xl p-5 bg-white/5 text-white focus:outline-none focus:ring-2 focus:ring-orange-600/20 focus:border-orange-600 transition-all font-bold placeholder-gray-600 text-sm tracking-widest"
              placeholder="••••••••">
          </div>
        </div>

        <button type="button" id="signupBtn" onclick="handleSignup()"
          class="w-full bg-orange-600 text-white font-black py-5 rounded-2xl hover:bg-orange-500 transition-all shadow-2xl shadow-orange-600/40 mt-10 active:scale-[0.98] uppercase tracking-[0.2em] text-xs flex items-center justify-center gap-3 group border-none cursor-pointer">
          Initialize <i class="fa-solid fa-user-plus group-hover:scale-110 transition-transform"></i>
        </button>
      </form>

    </div>
  </div>

  <script src="./assets/js/common.js?v=8"></script>
  <script src="assets/js/toast.js"></script>
  <script>
    // Use Global Toast instead of alert
    window.alert = function (msg) { showToast(msg, msg.includes('success') || msg.includes('Success') || msg.includes('accepted') ? 'success' : 'info'); };

    // Load Remembered User
    const savedUser = localStorage.getItem('rememberedUserEmail');
    if (savedUser) {
      document.getElementById('loginUser').value = savedUser;
      document.getElementById('userRememberMe').checked = true;
    }

    // Toggle Password Visibility
    document.getElementById('toggleLoginPass').addEventListener('click', function () {
      const passInput = document.getElementById('loginPass');
      const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passInput.setAttribute('type', type);
      this.classList.toggle('fa-eye');
      this.classList.toggle('fa-eye-slash');
    });

    function switchTab(tab) {
      const loginForm = document.getElementById('loginForm');
      const signupForm = document.getElementById('signupForm');
      const tabLogin = document.getElementById('tabLogin');
      const tabSignup = document.getElementById('tabSignup');

      if (tab === 'login') {
        loginForm.classList.remove('hidden');
        signupForm.classList.add('hidden');
        tabLogin.classList.add('border-orange-600', 'text-white');
        tabSignup.classList.remove('border-orange-600', 'text-white');
        tabSignup.classList.add('border-transparent', 'text-gray-600');
      } else {
        loginForm.classList.add('hidden');
        signupForm.classList.remove('hidden');
        tabSignup.classList.add('border-orange-600', 'text-white');
        tabLogin.classList.remove('border-orange-600', 'text-white');
        tabLogin.classList.add('border-transparent', 'text-gray-600');
      }
    }

    async function handleLogin() {
      const email = document.getElementById('loginUser').value;
      const password = document.getElementById('loginPass').value;
      const remember = document.getElementById('userRememberMe').checked;

      if (!email || !password) {
        showToast("Access Denied: Missing Credentials", "error");
        return;
      }

      const btn = document.getElementById('loginBtn');
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Authenticating...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (data.success) {
          showToast("Access Granted: Identity Verified", "success");
          localStorage.setItem('currentUser', JSON.stringify(data.user));

          if (remember) {
            localStorage.setItem('rememberedUserEmail', email);
          } else {
            localStorage.removeItem('rememberedUserEmail');
          }

          setTimeout(() => {
            // Redirect based on role if needed, default to index
            window.location.href = data.user.role === 'admin' ? 'admin.html' : 'index.html';
          }, 1500);
        } else {
          showToast("Authentication Failed: " + data.message, "error");
          btn.innerHTML = 'Verify & Enter <i class="fa-solid fa-arrow-right"></i>';
          btn.disabled = false;
        }
      } catch (err) {
        showToast("System Error: Connection Lost", "error");
        btn.innerHTML = 'Verify & Enter <i class="fa-solid fa-arrow-right"></i>';
        btn.disabled = false;
      }
    }

    async function handleSignup() {
      const username = document.getElementById('signupUser').value;
      const email = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPass').value;

      if (!username || !email || !password) {
        showToast("Protocol Error: All fields required", "error");
        return;
      }

      const btn = document.getElementById('signupBtn');
      btn.innerHTML = '<i class="fa-solid fa-cog fa-spin"></i> Initializing...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });
        const data = await res.json();

        if (data.success) {
          showToast("Creation Success: New Identity Formed", "success");
          setTimeout(() => switchTab('login'), 2000);
        } else {
          showToast("Initialization Refused: " + data.message, "error");
        }
      } catch (err) {
        showToast("System Error: Registry Timeout", "error");
      } finally {
        btn.innerHTML = 'Initialize <i class="fa-solid fa-user-plus"></i>';
        btn.disabled = false;
      }
    }
  </script>
</body>

</html>
