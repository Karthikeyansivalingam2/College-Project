<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Foodie Zone</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
      background-color: #f8f8f8;
      color: #1f2937;
    }
  </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4">

  <div
    class="bg-white rounded-3xl shadow-[0_32px_64px_-16px_rgba(0,0,0,0.1)] flex overflow-hidden w-full max-w-4xl min-h-[600px] border border-gray-100">

    <!-- Left Side: Image & Branding -->
    <div
      class="hidden md:flex w-1/2 bg-red-600 relative flex-col justify-center items-center text-white p-12 text-center">

      <div class="absolute inset-0 z-0 opacity-40">
        <img src="https://images.unsplash.com/photo-1543353071-873f17a7a088?q=80&w=800"
          class="w-full h-full object-cover">
      </div>

      <div class="relative z-10 transition-transform hover:scale-105 duration-500">
        <h1 class="text-5xl font-black mb-4 tracking-tighter uppercase">Foodie Zone</h1>

        <p class="text-red-50 text-xl font-medium leading-relaxed">Experience the Joy of Authentic Food</p>
      </div>
    </div>

    <!-- Right Side: Forms -->
    <div class="w-full md:w-1/2 p-10 md:p-14 relative flex flex-col justify-center">

      <!-- Navbar Back Link -->
      <a href="index.html"
        class="absolute top-6 right-8 text-gray-400 hover:text-red-500 text-sm font-bold uppercase tracking-widest transition-colors">
        <i class="fa-solid fa-arrow-left mr-2"></i> Home
      </a>

      <!-- Tabs -->
      <div class="flex gap-8 mb-10 border-b border-gray-100">
        <button onclick="switchTab('login')" id="tabLogin"
          class="pb-4 border-b-4 border-red-500 font-black text-red-500 uppercase tracking-widest text-sm">Login</button>
        <button onclick="switchTab('signup')" id="tabSignup"
          class="pb-4 border-b-4 border-transparent text-gray-400 hover:text-red-500 font-black uppercase tracking-widest text-sm transition-all">Sign
          Up</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="space-y-6">
        <div>
          <h2 class="text-3xl font-black text-gray-900 mb-2 tracking-tighter">Welcome Back</h2>
          <p class="text-gray-400 font-medium mb-8">Enter your details to continue</p>
        </div>

        <div>
          <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2">Phone or Email</label>
          <input type="text" id="loginUser"
            class="w-full border border-gray-100 rounded-2xl p-4 bg-gray-50 text-gray-900 focus:outline-none focus:ring-4 focus:ring-red-500/10 focus:border-red-500 transition-all font-bold placeholder-gray-300"
            placeholder="Enter your details">
        </div>

        <div class="relative">
          <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2">Password</label>
          <input type="password" id="loginPass"
            class="w-full border border-gray-100 rounded-2xl p-4 bg-gray-50 text-gray-900 focus:outline-none focus:ring-4 focus:ring-red-500/10 focus:border-red-500 transition-all font-bold placeholder-gray-300 pr-12"
            placeholder="••••••••">
          <i class="fa-solid fa-eye absolute right-4 top-11 text-gray-300 cursor-pointer hover:text-red-500 transition-colors"
            id="toggleLoginPass"></i>

          <div class="flex justify-between items-center mt-3">
            <label
              class="flex items-center gap-2 text-xs text-gray-500 cursor-pointer font-bold uppercase tracking-tighter hover:text-red-500 transition-colors">
              <input type="checkbox" id="userRememberMe"
                class="w-4 h-4 rounded-lg border-gray-200 text-red-500 focus:ring-red-500/20">
              Remember me
            </label>
            <a href="#" class="text-xs text-red-500 font-bold uppercase tracking-tighter hover:underline">Forgot?</a>
          </div>
        </div>

        <button type="button" id="loginBtn" onclick="handleLogin()"
          class="w-full bg-red-500 text-white font-black py-4 rounded-2xl hover:bg-red-600 transition-all shadow-xl shadow-red-500/20 mt-4 active:scale-[0.98] uppercase tracking-widest flex items-center justify-center gap-2">
          <i class="fa-solid fa-right-to-bracket"></i>
          Login Securely
        </button>
      </form>

      <!-- Signup Form -->
      <form id="signupForm" class="space-y-6 hidden">
        <div>
          <h2 class="text-3xl font-black text-gray-900 mb-2 tracking-tighter">Create Account</h2>
          <p class="text-gray-400 font-medium mb-8">Join the Foodie Zone network</p>
        </div>

        <div>
          <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2">Username</label>
          <input type="text" id="signupUser"
            class="w-full border border-gray-100 rounded-2xl p-4 bg-gray-50 text-gray-900 focus:outline-none focus:ring-4 focus:ring-red-500/10 focus:border-red-500 transition-all font-bold placeholder-gray-300"
            placeholder="karthikeyan">
        </div>

        <div>
          <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2">Email Address</label>
          <input type="email" id="signupEmail"
            class="w-full border border-gray-100 rounded-2xl p-4 bg-gray-50 text-gray-900 focus:outline-none focus:ring-4 focus:ring-red-500/10 focus:border-red-500 transition-all font-bold placeholder-gray-300"
            placeholder="name@example.com">
        </div>

        <div>
          <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2">Create Password</label>
          <input type="password" id="signupPass"
            class="w-full border border-gray-100 rounded-2xl p-4 bg-gray-50 text-gray-900 focus:outline-none focus:ring-4 focus:ring-red-500/10 focus:border-red-500 transition-all font-bold placeholder-gray-300"
            placeholder="Minimum 6 chars">
        </div>

        <button type="button" id="signupBtn" onclick="handleSignup()"
          class="w-full bg-red-500 text-white font-black py-4 rounded-2xl hover:bg-red-600 transition-all shadow-xl shadow-red-500/20 mt-4 active:scale-[0.98] uppercase tracking-widest flex items-center justify-center gap-2">
          <i class="fa-solid fa-user-plus"></i>
          Create My Account
        </button>
      </form>

    </div>
  </div>

  <script src="assets/js/toast.js"></script>
  <script>
    // Use Global Toast instead of alert
    window.alert = function (msg) { showToast(msg, msg.includes('success') || msg.includes('Success') || msg.includes('accepted') ? 'success' : 'info'); };

    // Load Remembered User
    const savedUser = localStorage.getItem('rememberedUserEmail');
    if (savedUser) {
      document.getElementById('loginUser').value = savedUser;
      document.getElementById('userRememberMe').checked = true;
    }

    // Toggle Password Visibility
    document.getElementById('toggleLoginPass').addEventListener('click', function () {
      const input = document.getElementById('loginPass');
      const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
      input.setAttribute('type', type);
      this.classList.toggle('fa-eye');
      this.classList.toggle('fa-eye-slash');
    });

    function switchTab(tab) {
      const loginForm = document.getElementById('loginForm');
      const signupForm = document.getElementById('signupForm');
      const tabLogin = document.getElementById('tabLogin');
      const tabSignup = document.getElementById('tabSignup');

      if (tab === 'login') {
        loginForm.classList.remove('hidden');
        signupForm.classList.add('hidden');
        tabLogin.classList.add('border-red-500', 'text-red-500');
        tabLogin.classList.remove('border-transparent', 'text-gray-400');
        tabSignup.classList.remove('border-red-500', 'text-red-500');
        tabSignup.classList.add('border-transparent', 'text-gray-400');
      } else {
        loginForm.classList.add('hidden');
        signupForm.classList.remove('hidden');
        tabSignup.classList.add('border-red-500', 'text-red-500');
        tabSignup.classList.remove('border-transparent', 'text-gray-400');
        tabLogin.classList.remove('border-red-500', 'text-red-500');
        tabLogin.classList.add('border-transparent', 'text-gray-400');
      }
    }

    function setLoginLoading(loading) {
      const btn = document.getElementById('loginBtn');
      if (loading) {
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Verifying...';
        btn.classList.add('opacity-70', 'cursor-not-allowed');
      } else {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Login Securely';
        btn.classList.remove('opacity-70', 'cursor-not-allowed');
      }
    }

    function setSignupLoading(loading) {
      const btn = document.getElementById('signupBtn');
      if (loading) {
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Creating Account...';
        btn.classList.add('opacity-70', 'cursor-not-allowed');
      } else {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-user-plus"></i> Create My Account';
        btn.classList.remove('opacity-70', 'cursor-not-allowed');
      }
    }

    async function handleSignup() {
      const username = document.getElementById('signupUser').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPass').value;

      if (!username || !email || !password) {
        alert("Please fill all fields");
        return;
      }
      if (password.length < 6) {
        alert("Password must be at least 6 characters");
        return;
      }

      setSignupLoading(true);
      try {
        const res = await fetch('/api/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });
        const data = await res.json();
        if (data.success) {
          alert("Account created successfully! Please login.");
          switchTab('login');
        } else {
          alert(data.message || "Signup failed. Try a different username.");
        }
      } catch (e) {
        alert("Network error. Please check your connection.");
      } finally {
        setSignupLoading(false);
      }
    }

    async function handleLogin() {
      const user = document.getElementById('loginUser').value.trim();
      const pass = document.getElementById('loginPass').value;
      const rememberMe = document.getElementById('userRememberMe').checked;

      if (!user) {
        alert("Please enter your username or email");
        return;
      }
      if (!pass) {
        alert("Please enter your password");
        return;
      }

      setLoginLoading(true);
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: user, password: pass })
        });

        const data = await res.json();
        if (data.success) {
          localStorage.setItem('currentUser', JSON.stringify(data.user));
          if (rememberMe) {
            localStorage.setItem('rememberedUserEmail', user);
          } else {
            localStorage.removeItem('rememberedUserEmail');
          }
          window.location.href = 'index.html';
          return;
        } else {
          alert(data.message || "Invalid username or password");
          setLoginLoading(false);
        }
      } catch (e) {
        // Offline fallback
        const u = { username: user, email: user + '@example.com' };
        localStorage.setItem('currentUser', JSON.stringify(u));
        alert("Logged in (Offline Mode)");
        window.location.href = 'index.html';
      }
    }
  </script>

</body>

</html>
