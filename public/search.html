<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Foodiee Results</title>
  <link rel="stylesheet" href="assets/css/common.css?v=10">
  <link rel="stylesheet" href="./assets/css/mobile.css?v=2">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ===== SEARCH PAGE REDESIGN ===== */
    body {
      background: var(--bg-main);
      color: var(--text-main);
    }

    .search-header {
      padding: 100px 20px 40px;
      text-align: center;
    }

    .search-header h1 {
      font-size: 42px;
      font-weight: 800;
      color: var(--text-dark);
      text-transform: uppercase;
      letter-spacing: -2px;
      font-style: italic;
    }

    .search-header p {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .results-header {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .back-btn {
      background: var(--bg-secondary);
      border: 1px solid var(--border-light);
      color: var(--primary-color);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      padding: 10px 20px;
      border-radius: 12px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.3s;
    }

    .back-btn:hover {
      background: var(--primary-color);
      color: white;
      transform: translateX(-5px);
    }

    /* ===== RESULTS GRID ===== */
    #results {
      max-width: 1200px;
      margin: 40px auto 100px;
      padding: 0 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 30px;
    }

    /* ===== PREMIUM SHOP CARD ===== */
    .shop-card {
      background: var(--bg-card);
      padding: 30px;
      border-radius: 2rem;
      border: 1px solid var(--border-light);
      display: flex;
      flex-direction: column;
      gap: 20px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-standard);
    }

    .shop-card:hover {
      transform: translateY(-10px);
      border-color: var(--primary-color-alpha);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
    }

    .shop-card h3 {
      font-size: 24px;
      font-weight: 900;
      color: var(--text-dark);
      text-transform: uppercase;
      letter-spacing: -1px;
      font-style: italic;
    }

    .badge {
      background: var(--primary-color-alpha);
      color: var(--primary-color);
      font-size: 9px;
      font-weight: 900;
      padding: 6px 12px;
      border-radius: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .card-location {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-tags {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .card-tags span {
      background: var(--bg-secondary);
      color: var(--text-main);
      padding: 6px 12px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
      border: 1px solid var(--border-light);
    }

    .details-btn {
      padding: 16px;
      border-radius: 12px;
      border: none;
      background: var(--primary-color);
      color: #fff;
      cursor: pointer;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s;
      margin-top: auto;
      box-shadow: 0 10px 20px rgba(255, 107, 0, 0.2);
    }

    .cta-btn:hover {
      transform: scale(1.03);
      box-shadow: 0 15px 30px rgba(255, 107, 0, 0.4);
      filter: brightness(1.1);
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 100px 20px;
      background: var(--bg-card);
      border-radius: 3rem;
      border: 1px dashed var(--border-light);
    }

    .empty-state h3 {
      font-size: 32px;
      font-weight: 900;
      color: var(--text-muted);
      margin-bottom: 25px;
      text-transform: uppercase;
      font-style: italic;
    }

    /* Hide debug overlay to keep design clean */
    #debugOverlay {
      opacity: 0.1;
      transform: scale(0.8);
      filter: grayscale(1);
    }

    #debugOverlay:hover {
      opacity: 1;
      filter: none;
      transform: scale(1);
    }

    /* ===== MOBILE ADJUSTMENTS ===== */
    @media (max-width: 768px) {
      .search-container-wrapper {
        padding-top: 100px;
      }

      #results {
        grid-template-columns: 1fr;
        padding: 0 20px 80px;
        gap: 25px;
      }

      .search-header h1 {
        font-size: 38px;
      }

      .results-header-bar {
        padding: 0 20px;
      }

      .shop-card {
        padding: 30px;
      }
    }
  </style>


</head>

<body>
  <!-- Global Navbar -->
  <div id="global-navbar"></div>

  <div class="search-container-wrapper">
    <header class="search-header">
      <h1>Foodiee Near You</h1>
      <p id="resultTitle">Finding the best spots for you...</p>
    </header>

    <!-- Back to Home -->
    <div class="results-header-bar" id="backToHome" style="display:none;">
      <button onclick="goHome()" class="back-btn-premium">
        <i class="fa-solid fa-arrow-left"></i> Back to Explore
      </button>
    </div>

    <!-- Results appear here -->
    <section id="results">
      <!-- Skeletons will be injected here via JS -->
    </section>
  </div>


  <script src="./assets/js/common.js?v=7"></script>
  <script src="./assets/js/search-page.js"></script>




</body>

</html>
