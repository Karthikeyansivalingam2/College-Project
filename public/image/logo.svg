<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="200" height="50">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@800&amp;display=swap');
    </style>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#CB202D"/>
      <stop offset="100%" style="stop-color:#E23744"/>
    </linearGradient>
  </defs>

  <!-- Small fork+knife icon — like Zomato's subtle mark -->
  <g transform="translate(2, 8)" fill="#CB202D">
    <!-- Fork -->
    <rect x="0"  y="0" width="1.5" height="9" rx="0.75"/>
    <rect x="3"  y="0" width="1.5" height="9" rx="0.75"/>
    <rect x="6"  y="0" width="1.5" height="9" rx="0.75"/>
    <path d="M0 8.5 Q3.75 11.5 7.5 8.5" fill="none" stroke="#CB202D" stroke-width="1.2"/>
    <rect x="3" y="10.5" width="1.5" height="20" rx="0.75"/>

    <!-- Knife -->
    <rect x="12" y="0"  width="1.5" height="30" rx="0.75"/>
    <path d="M12 0 Q17 5 13.5 12" fill="#CB202D" stroke="none"/>
  </g>

  <!-- "foodie" — bold lowercase like Zomato -->
  <text
    x="24" y="36"
    font-family="'Outfit', 'Helvetica Neue', Arial, sans-serif"
    font-size="30"
    font-weight="800"
    fill="url(#redGrad)"
    letter-spacing="-1">foodie</text>

  <!-- "zone" — smaller, lighter, dark gray like Zomato's tagline -->
  <text
    x="26" y="48"
    font-family="'Outfit', 'Helvetica Neue', Arial, sans-serif"
    font-size="11"
    font-weight="600"
    fill="#888888"
    letter-spacing="3">zone</text>
</svg>
